apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: picoclaw-livekit
  namespace: picoclaw-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: picoclaw-livekit
  minReplicas: 2
  maxReplicas: 10
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:
        - type: Percent
          value: 200
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 900
      selectPolicy: Min
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
  metrics:
    # Primary metric: session load (%) per pod.
    # 70% keeps headroom below the measured one-pod edge while avoiding early scale at 6/12 sessions.
    - type: Pods
      pods:
        metric:
          name: picoclaw_livekit_session_load_percent
        target:
          type: AverageValue
          averageValue: "60"
    # Secondary safety metric.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
