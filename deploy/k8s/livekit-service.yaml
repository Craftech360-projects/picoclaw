apiVersion: v1
kind: Service
metadata:
  name: picoclaw-livekit
  labels:
    app: picoclaw-livekit
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8192"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: picoclaw-livekit
  ports:
    - name: health
      port: 8192
      targetPort: health
      protocol: TCP

