apiVersion: apps/v1
kind: Deployment
metadata:
  name: picoclaw-livekit
  namespace: picoclaw-dev
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: picoclaw-livekit
  template:
    metadata:
      labels:
        app: picoclaw-livekit
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8192"
        prometheus.io/path: "/metrics"
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 120
      containers:
        - name: livekit
          image: picoclaw-livekit:local
          imagePullPolicy: IfNotPresent
          args: ["--agent-name", "cheeko-agent1", "--config", "/etc/picoclaw/config.json"]
          ports:
            - name: health
              containerPort: 8192
              protocol: TCP
          env:
            - name: PICOCLAW_LIVEKIT_STRICT_CONFIG
              value: "true"
            - name: PICOCLAW_LIVEKIT_DRAIN_TIMEOUT_SECONDS
              value: "120"
            - name: PICOCLAW_LIVEKIT_MAX_SESSIONS
              value: "10"
            - name: PICOCLAW_AGENTS_DEFAULTS_WORKSPACE
              value: /opt/picoclaw/workspace-template
            - name: MANAGER_API_URL
              valueFrom:
                secretKeyRef:
                  name: picoclaw-secrets
                  key: manager_api_url
            - name: MANAGER_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: picoclaw-secrets
                  key: manager_api_secret
          startupProbe:
            httpGet:
              path: /health
              port: health
            failureThreshold: 60
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "1500m"
              memory: "3Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
          volumeMounts:
            - name: cfg
              mountPath: /etc/picoclaw/config.json
              subPath: config.json
              readOnly: true
            - name: cfg
              mountPath: /etc/picoclaw/.security.yml
              subPath: .security.yml
              readOnly: true
            - name: work
              mountPath: /opt/picoclaw
      volumes:
        - name: cfg
          secret:
            secretName: picoclaw-config
        - name: work
          emptyDir: {}
