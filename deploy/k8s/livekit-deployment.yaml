apiVersion: apps/v1
kind: Deployment
metadata:
  name: picoclaw-livekit
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: picoclaw-livekit
  template:
    metadata:
      labels:
        app: picoclaw-livekit
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8192"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 900
      nodeSelector:
        node.kubernetes.io/instance-type: m7i.xlarge
      containers:
        - name: livekit
          image: 382188660865.dkr.ecr.ap-south-2.amazonaws.com/picoclaw-livekit:20260608-164238
          args: ["--agent-name", "cheeko-agent1", "--config", "/etc/picoclaw/config.json"]
          ports:
            - name: health
              containerPort: 8192
              protocol: TCP
          env:
            - name: PICOCLAW_CONFIG
              value: /etc/picoclaw/config.json
            - name: PICOCLAW_LIVEKIT_STRICT_CONFIG
              value: "true"
            - name: PICOCLAW_LIVEKIT_DRAIN_TIMEOUT_SECONDS
              value: "900"
            - name: PICOCLAW_LIVEKIT_HEALTH_PORT
              value: "8192"
            - name: PICOCLAW_LIVEKIT_MAX_SESSIONS
              value: "12"
            - name: PICOCLAW_LIVEKIT_RUNTIME_VAD_THRESHOLD
              value: "0.72"
            - name: PICOCLAW_LIVEKIT_RUNTIME_VAD_ENDPOINT_MS
              value: "800"
            - name: PICOCLAW_AGENTS_DEFAULTS_WORKSPACE
              value: /opt/picoclaw/workspace-template
            - name: MANAGER_API_URL
              valueFrom:
                secretKeyRef:
                  name: picoclaw-secrets
                  key: manager_api_url
            - name: MANAGER_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: picoclaw-secrets
                  key: manager_api_secret
            - name: STT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: picoclaw-secrets
                  key: stt_database_url
            - name: DIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: picoclaw-secrets
                  key: direct_url
          startupProbe:
            httpGet:
              path: /health
              port: health
            failureThreshold: 60
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          resources:
            requests:
              cpu: "3000m"
              memory: "6Gi"
              ephemeral-storage: "10Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
              ephemeral-storage: "20Gi"
          volumeMounts:
            - name: cfg
              mountPath: /etc/picoclaw/config.json
              subPath: config.json
              readOnly: true
            - name: cfg
              mountPath: /etc/picoclaw/.security.yml
              subPath: .security.yml
              readOnly: true
            - name: work
              mountPath: /opt/picoclaw
      volumes:
        - name: cfg
          secret:
            secretName: picoclaw-config
        - name: work
          emptyDir: {}
