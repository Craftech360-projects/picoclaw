apiVersion: apps/v1
kind: Deployment
metadata:
  name: picoclaw-livekit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: picoclaw-livekit
  template:
    metadata:
      labels:
        app: picoclaw-livekit
    spec:
      containers:
        - name: livekit
          image: your-registry/picoclaw-livekit:latest
          args: ["picoclaw-livekit", "--agent-name", "cheeko-agent", "--config", "/etc/picoclaw/config.json"]
          env:
            - name: PICOCLAW_CONFIG
              value: /etc/picoclaw/config.json
            - name: PICOCLAW_AGENTS_DEFAULTS_WORKSPACE
              value: /opt/picoclaw/workspace-template
            - name: STT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: picoclaw-secrets
                  key: stt_database_url
            - name: DIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: picoclaw-secrets
                  key: direct_url
          volumeMounts:
            - name: cfg
              mountPath: /etc/picoclaw/config.json
              subPath: config.json
              readOnly: true
            - name: cfg
              mountPath: /etc/picoclaw/.security.yml
              subPath: .security.yml
              readOnly: true
            - name: work
              mountPath: /opt/picoclaw
      volumes:
        - name: cfg
          secret:
            secretName: picoclaw-config
        - name: work
          emptyDir: {}
