name: build

on:
  push:
    branches: [ "main" ]
    paths:
      - "cmd/picoclaw-livekit/**"
      - "pkg/livekit/**"
      - "pkg/voice/**"
      - "pkg/tools/**"
      - "pkg/providers/**"
      - "pkg/config/**"
      - "workspace-template/skills/**"
      - "scripts/stt_providers_postgres.sql"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build voice worker
        run: make build-livekit
