name: PR

on:
  pull_request:
    paths:
      - "cmd/picoclaw-livekit/**"
      - "pkg/livekit/**"
      - "pkg/voice/**"
      - "pkg/tools/**"
      - "pkg/providers/**"
      - "pkg/config/**"
      - "workspace-template/skills/**"
      - "scripts/stt_providers_postgres.sql"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/pr.yml"

jobs:
  lint:
    name: Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run go generate
        run: |
          go generate ./cmd/picoclaw-livekit/...
          go generate ./pkg/livekit/...
          go generate ./pkg/voice/...

      - name: Golangci Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          args: --build-tags=goolm,stdjson ./cmd/picoclaw-livekit/... ./pkg/livekit/... ./pkg/voice/... ./pkg/tools/... ./pkg/providers/... ./pkg/config/...

  vuln_check:
    name: Security Check
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -tags=goolm,stdjson
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run Govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-package: ./cmd/picoclaw-livekit/... ./pkg/livekit/... ./pkg/voice/... ./pkg/tools/... ./pkg/providers/... ./pkg/config/...

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run go generate
        run: |
          go generate ./cmd/picoclaw-livekit/...
          go generate ./pkg/livekit/...
          go generate ./pkg/voice/...

      - name: Run LiveKit worker gate
        run: go test ./pkg/livekit ./cmd/picoclaw-livekit

      - name: Run go test
        run: go test -tags goolm,stdjson ./cmd/picoclaw-livekit/... ./pkg/livekit/... ./pkg/voice/... ./pkg/tools/... ./pkg/providers/... ./pkg/config/...
